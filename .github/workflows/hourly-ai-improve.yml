name: 배드민국 AI 자율 개선

on:
  schedule:
    - cron: '0 * * * *'   # 매 정시 UTC
  workflow_dispatch:

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Git config
        run: |
          git config user.name  "배드민국 AI"
          git config user.email "bot@badminguk.app"

      - name: Pick angle
        id: angle
        run: |
          HOUR=$(date -u +%-H)
          MOD=$((HOUR % 6))
          case $MOD in
            0) A="UX/UI"       T="Korean sports app mobile UX, onboarding, skeleton loading, accessibility";;
            1) A="MMR"         T="Elo Glicko-2 TrueSkill badminton rating decay provisional K-factor";;
            2) A="대회운영"    T="Korean badminton tournament 조편성 와일드카드 기권처리 시드배정";;
            3) A="성능/PWA"    T="React 19 performance Supabase realtime PWA offline web vitals";;
            4) A="부정방지"    T="sandbagging prevention proxy attendance anomaly detection sports rating";;
            5) A="AI기능"      T="match prediction player growth smart scheduling coach insights sports AI";;
          esac
          echo "ANGLE=$A" >> $GITHUB_OUTPUT
          echo "TOPIC=$T"  >> $GITHUB_OUTPUT
          echo "Angle: $A | Topic: $T"

      - name: Run AI agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat > /tmp/prompt.txt <<'PROMPT_EOF'
          You are an autonomous improvement agent for 배드민국 (Korean badminton MMR platform).
            Repo is already checked out in the current directory.

            THIS RUN ANGLE (use as a lens when choosing work): ${{ steps.angle.outputs.ANGLE }}

            STACK: React 19 + Vite + Tailwind 4 (CSS-first) + Supabase + Korean UI (#C60C30 red, #003478 blue)

            YOUR TASK:
            1. Read docs/FEATURE_ROADMAP.md — it is the canonical prioritized backlog (88 items, 3 stages).
            2. Read AI_PROGRESS.md if it exists (log of what previous runs already did — never redo those).
            3. Survey the codebase to see which roadmap items are already implemented.
            4. Pick 1-3 NOT-yet-implemented items, preferring: lower stage number first, then 필수 > 높음 priority,
               then items matching THIS RUN ANGLE, then smaller 규모 (소 > 중). Skip items needing new DB migrations,
               external API keys, or payments — those are human-gated.
            5. Implement them completely. Optionally WebSearch for reference (BWF rules, Korean tournament conventions).
            6. Run: npx vite build  — if it fails, fix until it passes. Never commit a broken build.
            7. Append to AI_PROGRESS.md: date (UTC), items done (roadmap numbers like 1-7), files touched, one-line summary each.
            8. Run: git add -A && git diff --cached --stat
            9. Run: git commit -m '[AI ${{ steps.angle.outputs.ANGLE }}] <roadmap item numbers + summary>'

            RULES:
            - Korean UI text only
            - Pure JSX/JS (no TypeScript)
            - Tailwind only
            - Never touch: send-otp/, verify-otp/, .github/, TEST_MODE in App.jsx
            - Never create or modify supabase/migrations/ files (schema changes are human-applied)
            - Never delete existing features or migration files
            - If everything feasible is done, improve test coverage or fix a bug instead, and log it

            Start by reading docs/FEATURE_ROADMAP.md now.
          PROMPT_EOF
          claude -p \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch" \
            < /tmp/prompt.txt 2>&1

      - name: Push changes
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "[AI] 자동 개선 잔여 변경사항"
          fi
          if [ -n "$(git log origin/master..HEAD --oneline)" ]; then
            git push origin master
            echo "Pushed."
          else
            echo "No changes."
          fi
